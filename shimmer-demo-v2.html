<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸灯 + 光效扫过 · 叠加 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0efeb;
  font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  padding: 40px 16px;
  display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
}
:root { --red: #C0392B; --gold: #C9A96E; --teal: #0D7377; }
h2 { width: 100%; text-align: center; color: #0D7377; }
p.note { width: 100%; text-align: center; color: #999; font-size: 13px; margin-bottom: 20px; }

/* ===== 卡片基础 ===== */
.card {
  width: 160px; background: #fff; border-radius: 12px;
  position: relative; overflow: hidden;
  transition: transform .2s;
}

/* ===== 一层：呼吸灯（爆品红色光晕） ===== */
.card.hot {
  border: 4px solid var(--red);
  overflow: visible;
  animation: glowRed 2.5s ease-in-out infinite;
}
@keyframes glowRed {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0); }
  50% { box-shadow: 0 0 10px 3px rgba(192,57,43,0.35), 0 0 28px 8px rgba(192,57,43,0.15), 0 0 50px 14px rgba(192,57,43,0.05); }
}

/* ===== 一层：呼吸灯（新品金色光晕） ===== */
.card.new {
  border: 2px solid rgba(201,169,110,.2);
  overflow: visible;
  animation: glowGold 2.5s ease-in-out infinite;
}
@keyframes glowGold {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
  50% { box-shadow: 0 0 10px 3px rgba(201,169,110,0.4), 0 0 28px 8px rgba(201,169,110,0.18), 0 0 50px 14px rgba(201,169,110,0.06); }
}

/* ===== 一层：角落标签呼吸缩放 ===== */
.card .pill {
  position: absolute; top: 6px; left: 8px; z-index: 10;
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 10px;
  animation: pillPulse 2s ease-in-out infinite;
}
.card.hot .pill { background: var(--red); }
.card.new .pill { background: var(--gold); }
@keyframes pillPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.9; }
}

/* ===== 二层：光效扫过 ===== */
.card::after {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,0.05) 30%,
    rgba(255,255,255,0.3) 45%,
    rgba(201,169,110,0.15) 50%,
    rgba(255,255,255,0.3) 55%,
    rgba(255,255,255,0.05) 70%,
    transparent 100%
  );
  transform: skewX(-20deg);
  animation: shimmer 4s ease-in-out infinite;
  pointer-events: none; z-index: 15;
}
@keyframes shimmer {
  0%   { left: -100%; }
  15%  { left: 150%; }
  100% { left: 150%; }
}
/* 各卡片错开扫光时间 */
.card:nth-child(2)::after { animation-delay: 0.3s; }
.card:nth-child(3)::after { animation-delay: 0.6s; }
.card:nth-child(4)::after { animation-delay: 0.9s; }
.card:nth-child(5)::after { animation-delay: 1.2s; }
.card:nth-child(6)::after { animation-delay: 1.5s; }

/* ===== 三层：新品金色边框流光 ===== */
.card.new::before {
  content: '';
  position: absolute; inset: -2px; border-radius: 14px; padding: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
  background-size: 200% 100%;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  animation: borderSweep 3s ease-in-out infinite;
  z-index: 8; pointer-events: none;
}
@keyframes borderSweep {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ===== 卡片内容 ===== */
.card-img {
  width: 100%; height: 130px;
  background: linear-gradient(145deg, #f5f2ec, #e8e3d9);
  display: flex; align-items: center; justify-content: center;
  font-size: 44px; position: relative; z-index: 1;
}
.card-body { padding: 10px 12px 12px; position: relative; z-index: 5; }
.card-name { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 4px; }
.tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
.tag-blue  { background: #e8f4f4; color: var(--teal); }
.tag-red   { background: #fde8e8; color: var(--red); }
.tag-gold  { background: #fdf3e0; color: var(--gold); }
.card-price { font-size: 16px; font-weight: 800; color: var(--red); }

/* ===== 图例 ===== */
.legend { width: 100%; text-align: center; margin-bottom: 16px; }
.legend span {
  display: inline-block; margin: 0 8px; font-size: 12px; color: #666;
  padding: 3px 12px; border-radius: 6px;
}
.legend .dot-hot { background: #fde8e8; }
.legend .dot-new { background: #fdf3e0; }
.legend .dot-normal { background: #f5f5f5; }

.replay-btn { width: 100%; margin-top: 24px; text-align: center; }
.replay-btn button {
  background: var(--teal); color: #fff; border: none;
  padding: 10px 32px; border-radius: 8px; font-size: 14px; cursor: pointer;
}
</style>
</head>
<body>
<h2>呼吸灯 × 光效扫过 · 叠加效果演示</h2>
<div class="legend">
  <span class="dot-hot">■ 爆品：红色呼吸光晕 + 标签脉冲 + 光效扫过</span><br>
  <span class="dot-new">■ 新品：金色呼吸光晕 + 标签脉冲 + 光效扫过 + 边框流光</span>
</div>
<p class="note">三层动画同时运行：外层呼吸光晕 → 中间扫光 → 角落标签缩放<br>各卡片依次播放，模拟页面初始加载的视觉效果</p>

<div id="cards">

    </div>
  </div>

  <!-- 新品 -->
  <div class="card new">
    <div class="pill">新品上市</div>
    <div class="card-img">🌺</div>
    <div class="card-body">
      <div class="card-name">生花好事</div>
      <div class="tags"><span class="tag tag-red">解瘾强</span></div>
      <div class="card-price">&yen;149</div>
    </div>
  </div>

  <!-- 普通 -->
  <div class="card">
    <div class="card-img">☕</div>
    <div class="card-body">
      <div class="card-name">满园茵茵</div>
      <div class="tags"><span class="tag tag-blue">拿铁温润</span></div>
      <div class="card-price">&yen;139</div>
    </div>
  </div>

  <!-- 爆品 -->
  <div class="card hot">
    <div class="pill">🔥 爆品</div>
    <div class="card-img">🟢</div>
    <div class="card-body">
      <div class="card-name">绿扇盈盈</div>
      <div class="tags"><span class="tag tag-blue">绿豆味</span></div>
      <div class="card-price">&yen;119</div>
    </div>
  </div>

  <!-- 新品 -->
  <div class="card new">
    <div class="pill">新品上市</div>
    <div class="card-img">🔧</div>
    <div class="card-body">
      <div class="card-name">匠造者-01</div>
      <div class="tags"><span class="tag tag-gold">爆款</span></div>

    </div>

  <!-- 普通 -->
  <div class="card">
    <div class="card-img">🍍</div>
    <div class="card-body">
      <div class="card-name">金光奕奕</div>

</div>

<div class="replay-btn">
  <button onclick="location.reload()">🔄 重新播放入场效果</button>
</div>
</body>
</html>
