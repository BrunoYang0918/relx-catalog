<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>口味图册 · 长寿路189弄购物中心店</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0A0A0A;
    color: #FFFFFF;
    min-height: 100vh;
    padding: 24px 20px 100px;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrap { max-width: 480px; margin: 0 auto; }

  /* Hero - 3 支产品并排 */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .product {
    background: #111111;
    border-radius: 14px;
    overflow: hidden;
    aspect-ratio: 218/380;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .product img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .product.yuying img { object-fit: contain; padding: 8px; background: #FAFAFA; }

  /* 角标 */
  .badge {
    display: inline-block;
    background: #FF3B30;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 14px;
    margin-bottom: 14px;
  }

  /* 主标题 */
  .headline {
    font-size: 36px;
    font-weight: 800;
    line-height: 1.15;
    color: #C9A96E;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .tagline {
    font-size: 17px;
    color: #B0B0B0;
    margin-bottom: 24px;
    font-weight: 400;
  }

  /* 热销排行 */
  .hots {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .hot {
    background: #111111;
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
  }
  .hot-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .hot-price { font-size: 12px; color: #C9A96E; }

  /* 二维码 */
  .qr-card {
    background: #111111;
    border-radius: 16px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .qr-img {
    width: 110px;
    height: 110px;
    background: #fff;
    border-radius: 10px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .qr-img img { width: 100%; height: 100%; display: block; }
  .qr-text { flex: 1; }
  .qr-1 { font-size: 17px; font-weight: 700; color: #C9A96E; margin-bottom: 4px; }
  .qr-2 { font-size: 13px; color: #8B8378; }

  /* 门店 */
  .store { text-align: center; font-size: 13px; color: #4A4A4A; margin-top: 18px; }

  /* 底部保存按钮 */
  .footer-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    z-index: 100;
  }
  .btn {
    flex: 1;
    padding: 14px 0;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
  }
  .btn-save { background: #C9A96E; color: #0A0A0A; }
  .btn-share { background: #222222; color: #C9A96E; }
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 15px;
    z-index: 999;
    display: none;
  }
  .toast.show { display: block; }
</style>
</head>

}
